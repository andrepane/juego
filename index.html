<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LEXIA</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app-root" class="app">
    <section id="home-screen" class="view panel home-screen">
      <p class="eyebrow">Plataforma educativa</p>
      <h1>LEXIA</h1>
      <p class="subtitle">Una experiencia interactiva para practicar habilidades lingüísticas con ejercicios breves, claros y progresivos.</p>

      <nav class="exercise-menu" aria-label="Menú de ejercicios">
        <button type="button" class="exercise-card" data-exercise="order-syllables">
          <strong>Ordenar sílabas</strong>
          <span>Organiza sílabas para formar palabras correctamente.</span>
        </button>
        <button type="button" class="exercise-card is-disabled" data-status="coming-soon" disabled>
          <strong>Intruso silábico</strong>
          <span>Próximamente.</span>
        </button>
        <button type="button" class="exercise-card is-disabled" data-status="coming-soon" disabled>
          <strong>Memoria</strong>
          <span>Próximamente.</span>
        </button>
      </nav>
    </section>

    <section id="exercise-screen" class="view exercise-screen" aria-label="Actividad ordenar sílabas">
      <header class="activity-topbar">
        <button id="home-btn" class="back-btn" type="button" aria-label="Volver a la portada">Salir</button>

        <div class="top-meta">
          <p class="eyebrow" id="level-label">Nivel 1</p>
          <h2 id="round-word">2 sílabas</h2>
        </div>

        <div class="top-controls">
          <div class="mode-tabs" aria-label="Selector de modo">
            <button class="mode-btn is-active" data-mode="normal">Normal</button>
            <button class="mode-btn" data-mode="intruders" disabled title="Próximamente">Intrusos</button>
          </div>
          <div class="score-box" aria-label="Aciertos acumulados">
            <span>Aciertos</span>
            <strong id="score">0</strong>
          </div>
          <div class="progress-box" aria-label="Progreso del ejercicio de sílabas">
            <span id="progress-label">0/15</span>
            <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="15" aria-valuenow="0" aria-labelledby="progress-label">
              <div id="progress-fill" class="progress-fill"></div>
            </div>
          </div>
        </div>
      </header>

      <main class="activity-stage">
        <div id="exercise-container" class="exercise-container"></div>
      </main>

      <footer class="activity-footer">
        <div class="level-tabs" aria-label="Selector de nivel">
          <button class="level-btn is-active" data-level="1">Nivel 1</button>
          <button class="level-btn" data-level="2">Nivel 2</button>
          <button class="level-btn" data-level="3">Nivel 3</button>
        </div>

        <div class="footer-actions">
          <button id="next-btn" class="secondary-btn">Nueva palabra</button>
        </div>

        <p id="feedback" class="feedback" aria-live="polite"></p>
      </footer>
    </section>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
